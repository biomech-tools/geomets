<script>
/* ================================
   i18n
================================ */
const i18n = {
  ja: {
    title: "地形対応 GPS 身体活動量評価ツール",
    langLabel: "言語",
    tzLabel: "JST/UTC",
    timeGenLabel: "時刻モデル",
    constSpeedLabel: "速度 (km/h)",
    fileLabel: "GPSファイルを選択 (*.gpx)",
    fileBtn: "ファイル選択",
    process: "計算実行",
    weightChange: "体重変更",
    mets: "平均 METs",
    kcalmin: "平均 kcal/分",
    ex: "Ex (METs･時)",
    saveGraph: "グラフ保存",
    saveData: "データ保存",
    showGraph: "グラフ表示",
    kcal: "総 kcal",
    totalTime: "総時間",
    totalDistance: "総距離",
    ascentDescent: "上り/下り",
  },
  en: {
    title: "Terrain-Adaptive GPS Physical Activity Assessment Tool",
    langLabel: "Language",
    tzLabel: "JST / UTC",
    timeGenLabel: "Time model",
    constSpeedLabel: "Speed (km/h)",
    fileLabel: "Select a GPS file (*.gpx)",
    fileBtn: "Select File",
    process: "Run calculation",
    weightChange: "Change BW",
    mets: "Average METs",
    kcalmin: "Average kcal/min",
    ex: "Ex (METs·hour)",
    saveGraph: "Save graph",
    saveData: "Save data",
    showGraph: "Show graph",
    kcal: "Total kcal",
    totalTime: "Total time",
    totalDistance: "Total distance",
    ascentDescent: "Up / Down",
  }
};

let currentLang = "ja";

function applyI18n() {
  const t = i18n[currentLang];

  // 副題だけを i18n で切り替える（GeoMETs は固定）
  document.getElementById("subtitle").textContent = t.title;

  document.getElementById("langLabel").textContent = t.langLabel;
  document.getElementById("tzLabel").textContent = t.tzLabel;
  document.getElementById("timeGenLabel").textContent = t.timeGenLabel;
  document.getElementById("constSpeedLabel").textContent = t.constSpeedLabel;
  document.getElementById("fileLabel").textContent = t.fileLabel;
  document.getElementById("fileBtn").textContent = t.fileBtn;
  document.getElementById("processBtn").textContent = t.process;
  document.getElementById("changeWeightBtn").textContent = t.weightChange;

  document.getElementById("saveBtn").textContent = t.saveData;
  document.getElementById("graphBtn").textContent = t.showGraph;

  const saveGraphBtn = document.getElementById("saveGraphBtn");
  if (saveGraphBtn) {
    saveGraphBtn.textContent = t.saveGraph;
  }
}
applyI18n();



/* ================================
   UI イベント
================================ */

document.getElementById("langSelect").addEventListener("change", e => {
  currentLang = e.target.value;
  timeMode = currentLang === "ja" ? "JST" : "UTC";
  document.getElementById("tzSelect").value = timeMode;
  applyI18n();
});

document.getElementById("fileBtn").addEventListener("click", () => {
  document.getElementById("fileInput").click();
});

document.getElementById("fileInput").addEventListener("change", e => {
  // ★ 新しいファイルを読み込んだら UI を完全リセット
  resetUI();

  const f = e.target.files[0];
  document.getElementById("fileName").textContent = f ? f.name : "(No file)";

  // ★ 時刻生成モデルは毎回 none に戻す
  document.getElementById("timeGenSelect").value = "none";
});

document.getElementById("tzSelect").addEventListener("change", e => {
  timeMode = e.target.value;
});


/* ================================
   体重管理
================================ */
function getBodyMass() {
  let w = localStorage.getItem("bodymass");
  if (!w) {
    w = prompt(i18n[currentLang].weightPrompt);
    if (!w) w = 60;
    localStorage.setItem("bodymass", w);
  }
  return parseFloat(w);
}

document.getElementById("changeWeightBtn").addEventListener("click", () => {
  const current = localStorage.getItem("bodymass") || "";
  const w = prompt(i18n[currentLang].weightPrompt, current);
  if (w) localStorage.setItem("bodymass", w);
});

/* ================================
   ファイル形式判定
================================ */
function detectFormat(text) {
  if (text.includes("<gpx")) return "gpx";
  return "unknown";
}

/* ================================
   GPX パーサー
================================ */
function parseGPX(text) {
  const parser = new DOMParser();
  const xml = parser.parseFromString(text, "application/xml");

  let pts = [...xml.getElementsByTagName("trkpt")];
  if (pts.length === 0) pts = [...xml.getElementsByTagName("rtept")];

  return pts.map(pt => {
    const lat = parseFloat(pt.getAttribute("lat"));
    const lon = parseFloat(pt.getAttribute("lon"));
const eleNode = pt.getElementsByTagNameNS("*", "ele")[0];
const ele = eleNode ? parseFloat(eleNode.textContent) : 0;
    const timeNode = pt.getElementsByTagName("time")[0];
    let time = null;
    if (timeNode) {
      const txt = timeNode.textContent.trim();
      if (txt.length > 0) time = new Date(txt);
    }
    return { lat, lon, alt: ele, time };
  });
}

/* ================================
   距離計算
================================ */
function toRad(d) { return d * Math.PI / 180; }

function distance2D(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
    Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

/* ================================
   Tobler 時刻生成（dt 最小 1 秒）
================================ */
function generateTimesTobler(points, startTime) {
  const result = [];
  let t = new Date(startTime);

  for (let i = 0; i < points.length; i++) {
    const p = points[i];

    if (p.alt == null || isNaN(p.alt)) {
      p.alt = i === 0 ? 0 : points[i - 1].alt;
    }

    // ★ 最初の点
    if (i === 0) {
      result.push({ ...p, time: new Date(t) });
      continue;
    }

    // ★ 2番目の点は必ず points[1] を使う（距離0問題を回避）
    const p1 = result[i - 1];
    const p2 = points[i];

    let d2d = distance2D(p1.lat, p1.lon, p2.lat, p2.lon);
    let dh = p2.alt - p1.alt;
    let d = Math.sqrt(d2d*d2d + dh*dh);

    // ★ 距離が 0 の場合は「強制的に 1m」とする
    if (d < 1) d = 1;

    const s = dh / d;
    const v = 6 * Math.exp(-3.5 * Math.abs(s + 0.05));

    let dt = d / (v * 1000 / 3600);
    if (dt < 1) dt = 1;  // ★ 最低1秒
if (dt > 10) dt = 10;   // ★ 最大10秒

    t = new Date(t.getTime() + dt * 1000);
    result.push({ ...p2, time: new Date(t) });
  }

  return result;
}


/* ================================
   20秒区間生成（start/end を必ず付与）
================================ */
function nearest(points, target) {
  let best = null, diff = Infinity;
  for (const p of points) {
    const d = Math.abs(p.time - target);
    if (d < diff) { diff = d; best = p; }
  }
  return best;
}

function slice20(points) {
  const segs = [];
  if (points.length < 2) return segs;

  let t = new Date(points[0].time);
  const end = points[points.length - 1].time;

  let isFirst = true;

  while (t < end) {

    let t2 = new Date(t.getTime() + 20000);

    let p1, p2;

    if (isFirst) {
      // ★ 最初の区間だけは絶対に20秒にする
      p1 = points[0];
      p2 = points[0];  // 位置は同じでOK（timeだけ20秒後）
      isFirst = false;

      segs.push({
        start: { ...p1, time: new Date(t) },
        end:   { ...p2, time: new Date(t2) }
      });

      t = t2;
      continue;
    }

    // ★ 2区間目以降は従来どおり nearest を使う
    p1 = nearest(points, t);
    p2 = nearest(points, t2);

    // p1 と p2 が同じ → 次の点を強制的に使う
    if (p1 === p2) {
      const idx = points.indexOf(p1);
      if (idx + 1 < points.length) p2 = points[idx + 1];
      else break;
    }

    // p2.time <= p1.time の場合も次の点へ
    if (p2.time <= p1.time) {
      const idx = points.indexOf(p1);
      if (idx + 1 < points.length) p2 = points[idx + 1];
      else break;
    }

    // ★ start/end を必ず付与
    segs.push({
      start: { ...p1, time: new Date(t) },
      end:   { ...p2, time: new Date(t2) }
    });

    t = t2;
  }

  return segs;
}


/* ================================
   Ci（歩行/走行）
================================ */
function Cw(i) {
  return 280.5*i**5 - 58.7*i**4 - 76.8*i**3 + 51.9*i**2 + 19.6*i + 2.5;
}
function Cr(i) {
  return 155.4*i**5 - 30.4*i**4 - 43.3*i**3 + 46.3*i**2 + 19.5*i + 3.6;
}

/* ================================
   METs 計算
================================ */
function processSegments(segs, bodymass) {
  let exCum = 0, kcalCum = 0;
  const results = [];

  for (const s of segs) {
    const d2d = distance2D(s.start.lat, s.start.lon, s.end.lat, s.end.lon);
    const dh = s.end.alt - s.start.alt;
    const d = Math.sqrt(d2d*d2d + dh*dh);

    if (d < 5) continue;
    if (Math.abs(dh) > 5) continue;

    const dt = 20;
    const v_mps = d / dt;
    const running = v_mps >= 1.11;

    const i = Math.max(-0.5, Math.min(0.5, dh / d));
    const Ci = running ? Cr(i) : Cw(i);

    const Ec = Ci * d;

    const Ek_net_per_kg = Ec * 0.000239 * (60 / dt);
    const Ek_net = Ek_net_per_kg * bodymass;

    const Ek_rest = 0.0175 * bodymass;

    const Ek_total = Ek_net + Ek_rest;

    let METs = Ek_total / (0.0175 * bodymass);
    if (METs < 1) METs = 1;
    METs = Math.min(METs, 18);

    const exDelta = METs * (dt / 3600);
    const kcalDelta = Ek_total * (dt / 60);

    exCum += exDelta;
    kcalCum += kcalDelta;

    results.push({
      start: s.start.time,   // ★ 開始時刻
      end:   s.end.time,     // ★ 終了時刻（追加）

      alt: s.start.alt,
      d, dh, i,
      speed: v_mps * 3.6,
      running,
      METs,
      Ek: Ek_total,
      exCum,
      kcalCum
    });
  }
  return results;
}

/* ================================
   累積距離
================================ */
function addCumulativeDistance(res) {
  let cum = 0;
  for (const r of res) {
    cum += r.d;
    r.cumDist = cum;
  }
}

/* ================================
   結果表示
================================ */
function showResult(res, stats) {
  const t = i18n[currentLang];

  if (res.length === 0) {
    document.getElementById("result").textContent = t.noData;
    return;
  }

  const last = res[res.length - 1];

  const dtSec = 20;
  const dtHour = dtSec / 3600;

  const avgMETs =
    res.reduce((sum, r) => sum + r.METs, 0) / res.length;

  const maxMETs =
    res.reduce((max, r) => (r.METs > max ? r.METs : max), 0);

  const totalEx =
    res.reduce((sum, r) => sum + r.METs * dtHour, 0);

  const totalKcal = last.kcalCum;

  const h = Math.floor(stats.totalTimeSec / 3600);
  const m = Math.floor((stats.totalTimeSec % 3600) / 60);
  const s = stats.totalTimeSec % 60;
  const totalTimeStr = `${h}h${m}m${s}s`;

  const distKm = (stats.totalDist / 1000).toFixed(3);
  const up = Math.round(stats.totalUp);
  const down = Math.round(stats.totalDown);

  /* ================================
     ★ 開始・終了時刻の表示（JST/UTC）
  ================================= */
  function formatClock(date) {
    if (!date) return "";

    let t = date;
    if (currentTZ === "JST") {
      t = new Date(date.getTime() + 9 * 3600 * 1000);
    }

    const hh = String(t.getUTCHours()).padStart(2, "0");
    const mm = String(t.getUTCMinutes()).padStart(2, "0");
    return `${hh}:${mm}`;
  }

  let timeRangeStr = "";
  if (res[0].start && res[res.length - 1].end) {
    const startStr = formatClock(res[0].start);
    const endStr   = formatClock(res[res.length - 1].end);
    timeRangeStr = ` (${startStr} - ${endStr} ${currentTZ})`;
  }

  /* ================================
     結果 HTML
  ================================= */
  document.getElementById("result").innerHTML = `
<div style="font-size:1.6em; font-weight:bold; color:#000; margin:0; line-height:1.2;">
  ${i18n[currentLang].mets}: ${avgMETs.toFixed(1)}
</div>

<div style="font-size:1.6em; font-weight:bold; color:#000; margin:0; line-height:1.2;">
  Max METs: ${maxMETs.toFixed(1)}
</div>

<div style="font-size:1.6em; font-weight:bold; color:#000; margin:0; line-height:1.2;">
  ${i18n[currentLang].ex}: ${totalEx.toFixed(2)}
</div>

<div style="font-size:1.0em; color:#000;">
  ${i18n[currentLang].kcal}: ${Math.round(totalKcal)}
</div>

<div style="font-size:1.0em; color:#000;">
  ${t.totalTime}: ${totalTimeStr}${timeRangeStr}
</div>

<div style="font-size:1.0em; color:#000;">
  ${t.totalDistance}: ${distKm} km
</div>

<div style="font-size:1.0em; color:#000;">
  ${t.ascentDescent}: ${up} m / ${down} m
</div>
  `;

  // ★ 枠線 ON
  document.getElementById("result").style.border = "1px solid #aaa";
}

/* ================================
   メイン処理
================================ */
document.getElementById("processBtn").addEventListener("click", () => {
  const file = document.getElementById("fileInput").files[0];
  if (!file) {
    alert(i18n[currentLang].selectFile);
    return;
  }

  const reader = new FileReader();
  reader.onload = () => {
    const text = reader.result;
    const fmt = detectFormat(text);

    let points = [];
    if (fmt === "gpx") points = parseGPX(text);
    else {
      alert(i18n[currentLang].unknownFormat);
      return;
    }

    const hasAllTime = points.every(p => p.time !== null);
    const userModel = document.getElementById("timeGenSelect").value;

    let internalModel;
    if (userModel === "tobler") internalModel = "tobler";
    else internalModel = hasAllTime ? "none" : "tobler";

    document.getElementById("timeGenSelect").value = internalModel;

    let pointsWithTime;
    if (internalModel === "none") pointsWithTime = points;
    else pointsWithTime = generateTimesTobler(points, new Date());

    const segs = slice20(pointsWithTime);
    const bodymass = getBodyMass();
    const res = processSegments(segs, bodymass);

    let totalDist = 0;
    let totalUp = 0;
    let totalDown = 0;
    let maxMETs = 0;

    for (const r of res) {
      totalDist += r.d;
      if (r.dh > 0) totalUp += r.dh;
      else totalDown += Math.abs(r.dh);
      if (r.METs > maxMETs) maxMETs = r.METs;
    }

    const totalTimeSec = segs.length * 20;

    addCumulativeDistance(res);
    window.lastResult = res;

    showResult(res, {
      totalDist,
      totalUp,
      totalDown,
      maxMETs,
      totalTimeSec
    });
  };

  reader.readAsText(file);
});

/* ================================
   Excel 保存
================================ */
document.getElementById("saveBtn").addEventListener("click", () => {
  if (!window.lastResult) {
    alert("先に計算を実行してください");
    return;
  }

  const res = window.lastResult;

  const rows = [
    ["Index", "Time", "Altitude(m)", "Distance(m)", "Altitude Δ(m)", "Speed(km/h)",
     "METs", "kcal/min", "Cumulative Dist(m)", "Cumulative Ex", "Cumulative kcal"]
  ];

  res.forEach((r, i) => {
    rows.push([
      i + 1,
      r.start.toISOString(),
      r.alt,
      r.d.toFixed(2),
      r.dh.toFixed(2),
      r.speed.toFixed(2),
      r.METs.toFixed(2),
      r.Ek.toFixed(2),
      r.cumDist.toFixed(2),
      r.exCum.toFixed(2),
      r.kcalCum.toFixed(2)
    ]);
  });

  const ws = XLSX.utils.aoa_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "20sec Data");

  // ★ JST/UTC 切り替えに応じたファイル名
  XLSX.writeFile(wb, `GPS-METs-Data_${getNowForFilename()}.xlsx`);
});



/* ================================
   JST/UTC 切り替え
================================ */
let currentTZ = "JST";  // デフォルト

const tzSelect = document.getElementById("tzSelect");
if (tzSelect) {
  tzSelect.addEventListener("change", (e) => {
    currentTZ = e.target.value;
  });
}


/* ================================
   ユーティリティ関数
================================ */
function getNowForFilename() {
  const now = new Date();

  let t = now;
  if (currentTZ === "JST") {
    t = new Date(now.getTime() + 9 * 3600 * 1000);
  } else {
    t = new Date(now.getTime());
  }

  const yyyy = t.getUTCFullYear();
  const mm   = String(t.getUTCMonth() + 1).padStart(2, "0");
  const dd   = String(t.getUTCDate()).padStart(2, "0");
  const hh   = String(t.getUTCHours()).padStart(2, "0");
  const mi   = String(t.getUTCMinutes()).padStart(2, "0");

  return `${yyyy}${mm}${dd}-${hh}${mi}`;
}


/* ================================
   著作権警告（30日サイクル）
================================ */
window.addEventListener("load", () => {
  const lastShown = localStorage.getItem("warningLastShown");
  const now = Date.now();
  const THIRTY_DAYS = 30 * 24 * 60 * 60 * 1000;

  if (!lastShown || now - lastShown > THIRTY_DAYS) {
    alert("CAUTION: This tool is protected by copyright (©2026 A. Azuma. All Rights Reserved). Unauthorized downloading, copying, or redistribution is prohibited.\n注意：本ツールは著作権により保護されています (©2026 A. Azuma. All Rights Reserved)．無断でのダウンロード，複製，再配布を禁じます．");
    localStorage.setItem("warningLastShown", now);
  }
});

/* ================================
   不正利用抑止（右クリック・ショートカット無効化）
================================ */

// 右クリック禁止（Canvas 操作には影響なし）
document.addEventListener('contextmenu', e => e.preventDefault());

// 特定のショートカットだけ無効化
document.addEventListener('keydown', e => {
  // Ctrl+S（保存）
  if (e.ctrlKey && e.key.toLowerCase() === 's') {
    e.preventDefault();
  }

  // Ctrl+P（印刷）
  if (e.ctrlKey && e.key.toLowerCase() === 'p') {
    e.preventDefault();
  }

  // Ctrl+Shift+I（DevTools）
  if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'i') {
    e.preventDefault();
  }

  // Ctrl+Shift+C（要素検証）
  if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'c') {
    e.preventDefault();
  }

  // Ctrl+Shift+J（DevTools Console）
  if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'j') {
    e.preventDefault();
  }

  // F12（DevTools）
  if (e.key === 'F12') {
    e.preventDefault();
  }
});


/* ================================
   グラフ表示（改良版）
================================ */
let chart = null;



function resetUI() {
  // 内部データをリセット
  window.lastResult = null;

  // ★ 結果表示エリアを消す（ID は result）
  const resultEl = document.getElementById("result");
  if (resultEl) {
    resultEl.innerHTML = "";
    resultEl.style.border = "none";  // 枠線も消す
  }

  // グラフエリアを消す
  const graphArea = document.getElementById("graphArea");
  if (graphArea) graphArea.innerHTML = "";

  // グラフインスタンスも破棄
  if (chart) {
    chart.destroy();
    chart = null;
  }
}



document.getElementById("graphBtn").addEventListener("click", () => {
  if (!window.lastResult) {
    alert("先に計算を実行してください");
    return;
  }

  const res = window.lastResult;

  const labels = res.map((r, i) => ((i * 20) / 60).toFixed(1));
  const timeMin = res.map((r, i) => (i * 20) / 60);

  const totalMinutes = timeMin[timeMin.length - 1];

  let lineWidth = 2;
  if (totalMinutes > 60) lineWidth *= 0.5;
  else if (totalMinutes > 30) lineWidth *= 0.75;

  const metsData = res.map((r, i) => ({ x: timeMin[i], y: r.METs }));
  const altsData = res.map((r, i) => ({ x: timeMin[i], y: r.alt }));

  document.getElementById("graphArea").innerHTML = `
    <canvas id="graphCanvas" height="200"></canvas>
    <button id="saveGraphBtn"></button>
  `;
  applyI18n();

  const ctx = document.getElementById("graphCanvas").getContext("2d");

  if (chart) chart.destroy();

// ★ ここに追加（Chart.js の直前）
const maxMets = Math.max(...res.map(r => r.METs));
const maxAlt  = Math.max(...res.map(r => r.alt));

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [
        {
          label: "METs",
          data: metsData,
          borderColor: "blue",
          borderWidth: lineWidth,
          pointRadius: 0,
          yAxisID: "y1"
        },
        {
          label: "Altitude (m)",
          data: altsData,
          borderColor: "green",
          borderWidth: lineWidth,
          pointRadius: 0,
          yAxisID: "y2"
        }
      ]
    },
    options: {
      responsive: true,
      scales: {
        x: {
          type: "linear",
          title: { display: true, text: "Time (min)", color: "#000" },
          grid: { display: false },
          ticks: {
            stepSize: 10,
            tickLength: 10,
            color: "#000",
            maxRotation: 0,
            minRotation: 0
          },
          border: { width: 1.3, color: "#000" }
        },

y1: {
  position: "left",
  title: { display: true, text: "METs", color: "#000" },
  grid: { display: false },
  ticks: { tickLength: 8, color: "#000" },
  border: { width: 1.3, color: "#000" },
  suggestedMax: maxMets * 1.1   // ★ 追加
},

y2: {
  position: "right",
  title: { display: true, text: "Altitude (m)", color: "#000" },
  grid: { display: false },
  ticks: { tickLength: 8, color: "#000" },
  border: { width: 1.3, color: "#000" },
  suggestedMax: maxAlt * 1.1    // ★ 追加
}

      },

      plugins: {
        legend: {
          labels: {
            usePointStyle: true,
            pointStyle: "line",
            pointStyleWidth: 35,   // ★ 長すぎたので適正値に戻す
            boxWidth: 35,
            boxHeight: 2
          }
        }
      }
    },

    // ★★★ 上側の線を描く正しい位置（options の外） ★★★
    plugins: [{
      afterDraw: (chart) => {
        const ctx = chart.ctx;
        const chartArea = chart.chartArea;

        ctx.save();
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 1.3;
        ctx.beginPath();
        ctx.moveTo(chartArea.left, chartArea.top);
        ctx.lineTo(chartArea.right, chartArea.top);
        ctx.stroke();
        ctx.restore();
      }
    }]
  });

document.getElementById("saveGraphBtn").addEventListener("click", () => {
  const canvas = document.getElementById("graphCanvas");

  // 一時キャンバスを作成
  const tempCanvas = document.createElement("canvas");
  const tctx = tempCanvas.getContext("2d");

  tempCanvas.width = canvas.width;
  tempCanvas.height = canvas.height;

  // 背景を白で塗る
  tctx.fillStyle = "#ffffff";
  tctx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);

  // 元のキャンバスを描画（軸・ラベル・線すべて含む）
  tctx.drawImage(canvas, 0, 0);

  // PNG で保存
  const url = tempCanvas.toDataURL("image/png");

  const a = document.createElement("a");
  a.href = url;
  a.download = `figure_${getNowForFilename()}.png`;
   // ★ ファイル名を figure.png に変更
  a.click();
});

});


</script>
