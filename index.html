<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GeoMETs – Terrain-Adaptive GPS Physical Activity Assessment Tool</title>

<link rel="manifest" href="manifest.json">
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  :root {
    --primary: #1a6fb5;
    --primary-dark: #145a94;
    --start-color: #1a8c3e;
    --start-dark: #136b2f;
    --mets-low: #555555;
    --mets-mid: #1a8c3e;
    --mets-high: #c0392b;
    --bg: #f0f2f5;
    --card: #ffffff;
    --border: #d0d7de;
    --text: #1a1a2e;
    --text-sub: #666;
    --radius: 12px;
    --shadow: 0 2px 8px rgba(0,0,0,0.09);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  #app {
    max-width: 480px;
    margin: 0 auto;
    padding: 10px 10px 24px;
    display: flex;
    flex-direction: column;
    gap: 9px;
  }

  /* ---- Header ---- */
  #header {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 11px 14px 10px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }
  #header-left { display: flex; flex-direction: column; gap: 1px; }
  #app-title {
    font-size: 1.75em;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--primary);
    line-height: 1;
    display: flex;
    align-items: baseline;
    gap: 3px;
  }
  #app-version { font-size: 0.68em; color: var(--text-sub); margin-top: 1px; }
  #app-subtitle { font-size: 0.74em; color: var(--text-sub); margin-top: 2px; line-height: 1.35; }
  #header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 5px;
    flex-shrink: 0;
  }
  #lang-btn {
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 5px 15px;
    font-size: 0.82em;
    font-weight: 700;
    cursor: pointer;
    min-width: 48px;
    text-align: center;
  }
  #lang-btn:active { background: var(--primary-dark); }
  #reload-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 0.78em;
    color: var(--text-sub);
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  #reload-btn:active { background: #f0f2f5; }

  /* ---- Config card ---- */
  #config-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .config-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .config-col {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
  }
  .config-col.col-tz { flex: 0.7; }
  .config-col.col-model { flex: 1.3; }
  .config-label {
    font-size: 0.69em;
    font-weight: 700;
    color: var(--text-sub);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .config-select {
    width: 100%;
    padding: 8px 10px;
    font-size: 0.88em;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: #fff;
    color: var(--text);
    outline: none;
    -webkit-appearance: none;
    appearance: none;
    cursor: pointer;
  }
  .config-select:focus { border-color: var(--primary); }

  /* ---- Info bar ---- */
  #info-bar {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 9px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  #weight-display { font-size: 0.86em; color: var(--text-sub); }
  #weight-val { font-weight: 700; color: var(--text); }
  #change-weight-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 0.80em;
    color: var(--primary);
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  #change-weight-btn:active { background: #eef4fb; }

  /* ---- File card ---- */
  #file-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  #file-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #file-select-btn {
    flex-shrink: 0;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 0.88em;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.13s;
  }
  #file-select-btn:active { background: var(--primary-dark); }
  #file-name {
    flex: 1;
    font-size: 0.82em;
    color: var(--text-sub);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #file-name.loaded { color: var(--text); font-weight: 600; }

  /* ---- Process button ---- */
  #process-btn {
    width: 100%;
    background: var(--start-color);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 18px 10px;
    font-size: 1.35em;
    font-weight: 800;
    letter-spacing: 2px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(26,140,62,0.28);
    transition: all 0.14s;
  }
  #process-btn:active { background: var(--start-dark); transform: scale(0.98); }

  /* ---- Save / Graph row ---- */
  #action-row {
    display: none;
    gap: 8px;
  }
  .action-btn {
    flex: 1;
    background: var(--card);
    color: var(--primary);
    border: 2px solid var(--primary);
    border-radius: var(--radius);
    padding: 12px 8px;
    font-size: 0.88em;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.13s;
    white-space: nowrap;
  }
  .action-btn:active { background: #eef4fb; }

  /* ---- Result card ---- */
  #result-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px;
    display: none;
  }
  #result-card.visible { display: block; }
  #result-title {
    font-size: 0.95em;
    font-weight: 800;
    color: var(--text);
    padding-bottom: 7px;
    margin-bottom: 10px;
    border-bottom: 2.5px solid var(--primary);
  }

  .section-label {
    font-size: 0.69em;
    font-weight: 700;
    color: var(--text-sub);
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 4px;
    margin-bottom: 8px;
  }

  /* METs big display */
  #mets-big-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 4px;
  }
  #mets-big-value {
    font-size: 4.2em;
    font-weight: 800;
    line-height: 1;
    color: var(--primary);
    font-variant-numeric: tabular-nums;
  }
  #mets-big-unit { font-size: 1.05em; font-weight: 600; color: var(--text-sub); }
  #mets-max-row {
    font-size: 0.95em;
    color: var(--text-sub);
    margin-bottom: 12px;
  }
  #mets-max-val { font-weight: 700; color: var(--text); }

  .sum-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 7px;
    margin-bottom: 10px;
  }
  .sum-cell {
    background: #f4f7fb;
    border-radius: 8px;
    padding: 9px 10px;
  }
  .sum-cell.full { grid-column: 1 / -1; }
  .sum-label { font-size: 0.68em; color: var(--text-sub); font-weight: 600; margin-bottom: 3px; }
  .sum-value { font-size: 1.10em; font-weight: 700; color: var(--text); }
  .sum-value.big { font-size: 1.45em; }
  .sum-value.accent { color: var(--primary); }

  /* Time range badge */
  #time-range-badge {
    display: inline-block;
    background: #eef4fb;
    color: var(--primary);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 0.78em;
    font-weight: 700;
    margin-left: 4px;
  }

  /* ---- Graph card ---- */
  #graph-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px;
    display: none;
  }
  #graph-card.visible { display: block; }
  #graph-title {
    font-size: 0.90em;
    font-weight: 800;
    color: var(--text);
    padding-bottom: 6px;
    margin-bottom: 10px;
    border-bottom: 2.5px solid var(--primary);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  #save-graph-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 0.76em;
    color: var(--primary);
    font-weight: 700;
    cursor: pointer;
  }
  #save-graph-btn:active { background: #eef4fb; }
  #graph-canvas-wrap { position: relative; }

  /* ---- Modal ---- */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.48);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #modal-overlay.visible { display: flex; }
  #modal-box {
    background: #fff;
    border-radius: 16px;
    padding: 24px 20px 20px;
    width: 100%;
    max-width: 300px;
    box-shadow: 0 8px 36px rgba(0,0,0,0.22);
  }
  #modal-title { font-size: 1.05em; font-weight: 800; margin-bottom: 8px; }
  #modal-msg { font-size: 0.84em; color: var(--text-sub); margin-bottom: 13px; line-height: 1.5; }
  #modal-input {
    width: 100%;
    padding: 10px 12px;
    font-size: 1.1em;
    border: 1.5px solid var(--border);
    border-radius: 9px;
    margin-bottom: 14px;
    outline: none;
    -webkit-appearance: none;
  }
  #modal-input:focus { border-color: var(--primary); }
  #modal-btns { display: flex; gap: 8px; }
  .m-btn {
    flex: 1;
    padding: 11px;
    border: none;
    border-radius: 9px;
    font-size: 0.95em;
    font-weight: 700;
    cursor: pointer;
  }
  #modal-ok { background: var(--primary); color: #fff; }
  #modal-cancel { background: #f0f2f5; color: var(--text); }

  /* ---- Copyright ---- */
  #copyright {
    text-align: center;
    font-size: 0.64em;
    color: #b0b8c4;
    padding: 2px 0 6px;
  }

  /* hidden file input */
  #file-input { display: none; }
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div id="header">
    <div id="header-left">
      <div id="app-title">GeoMETs</div>
      <div id="app-version">V1.0 Beta</div>
      <div id="app-subtitle" data-i18n="subtitle">地形対応 GPS 身体活動量評価ツール</div>
    </div>
    <div id="header-right">
      <button id="lang-btn">EN</button>
      <button id="reload-btn" data-i18n="reload">リセット</button>
    </div>
  </div>

  <!-- Config card -->
  <div id="config-card">
    <div class="config-row">
      <div class="config-col col-tz">
        <div class="config-label" data-i18n="tzLabel">JST / UTC</div>
        <select class="config-select" id="tz-select">
          <option value="JST">JST</option>
          <option value="UTC">UTC</option>
        </select>
      </div>
      <div class="config-col col-model">
        <div class="config-label" data-i18n="timeModelLabel">時刻モデル</div>
        <select class="config-select" id="time-model-select">
          <option value="none">Use Time Data</option>
          <option value="tobler">Tobler Estimation</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Info bar (body weight) -->
  <div id="info-bar">
    <div id="weight-display">
      <span data-i18n="bodyweight">体重</span>: <span id="weight-val">--</span> kg
    </div>
    <button id="change-weight-btn" data-i18n="changeWeight">体重変更</button>
  </div>

  <!-- File card -->
  <div id="file-card">
    <div class="config-label" data-i18n="fileLabel">GPSファイルを選択 (*.gpx)</div>
    <div id="file-row">
      <button id="file-select-btn" data-i18n="fileBtn">ファイル選択</button>
      <div id="file-name" data-i18n="noFile">(No file)</div>
    </div>
    <input type="file" id="file-input" accept=".gpx">
  </div>

  <!-- Process button -->
  <button id="process-btn" data-i18n="process">計算実行</button>

  <!-- Save / Graph action row -->
  <div id="action-row">
    <button class="action-btn" id="save-btn" data-i18n="saveData">データ保存</button>
    <button class="action-btn" id="graph-btn" data-i18n="showGraph">グラフ表示</button>
  </div>

  <!-- Result card -->
  <div id="result-card">
    <div id="result-title" data-i18n="resultTitle">解析結果</div>

    <div class="section-label" data-i18n="activityLevel">身体活動水準</div>
    <div id="mets-big-row">
      <div id="mets-big-value">--</div>
      <div id="mets-big-unit">METs<span id="mets-avg-label" style="font-size:0.62em; font-weight:600; color:var(--text-sub); margin-left:3px;" data-i18n="metsAvgLabel">（平均）</span></div>
    </div>
    <div id="mets-max-row">
      Max METs: <span id="mets-max-val">--</span>
    </div>

    <div class="sum-grid">
      <div class="sum-cell full">
        <div class="sum-label">Ex (METs·<span data-i18n="hour">時</span>)</div>
        <div class="sum-value big accent" id="sum-ex">--</div>
      </div>
      <div class="sum-cell">
        <div class="sum-label" data-i18n="totalKcal">総 kcal</div>
        <div class="sum-value big" id="sum-kcal">--</div>
      </div>
      <div class="sum-cell">
        <div class="sum-label" data-i18n="avgKcalmin">平均 kcal/min</div>
        <div class="sum-value" id="sum-kcalmin">--</div>
      </div>
    </div>

    <div class="section-label" style="margin-top:4px;" data-i18n="activityStats">活動統計</div>
    <div class="sum-grid">
      <div class="sum-cell full">
        <div class="sum-label" data-i18n="totalTime">総時間</div>
        <div class="sum-value" id="sum-time">--</div>
      </div>
      <div class="sum-cell full">
        <div class="sum-label" data-i18n="totalDist">総距離</div>
        <div class="sum-value" id="sum-dist">--</div>
      </div>
      <div class="sum-cell">
        <div class="sum-label" data-i18n="ascent">上り</div>
        <div class="sum-value" id="sum-up">--</div>
      </div>
      <div class="sum-cell">
        <div class="sum-label" data-i18n="descent">下り</div>
        <div class="sum-value" id="sum-down">--</div>
      </div>
    </div>
  </div>

  <!-- Graph card -->
  <div id="graph-card">
    <div id="graph-title">
      <span data-i18n="graphTitle">METs / 高度 グラフ</span>
      <button id="save-graph-btn" data-i18n="saveGraph">グラフ保存</button>
    </div>
    <div id="graph-canvas-wrap">
      <canvas id="graph-canvas" height="200"></canvas>
    </div>
  </div>

  <div id="copyright">©2026 A. Azuma. All Rights Reserved.</div>
</div>

<!-- Modal (weight input) -->
<div id="modal-overlay">
  <div id="modal-box">
    <div id="modal-title"></div>
    <div id="modal-msg"></div>
    <input type="number" id="modal-input" inputmode="decimal" min="20" max="300" step="0.1">
    <div id="modal-btns">
      <button class="m-btn" id="modal-cancel" data-i18n="cancel">キャンセル</button>
      <button class="m-btn" id="modal-ok" data-i18n="ok">OK</button>
    </div>
  </div>
</div>

<script>
/* ==========================================================
   i18n
========================================================== */
const T = {
  ja: {
    subtitle:       "地形対応 GPS 身体活動量評価ツール",
    reload:         "リセット",
    tzLabel:        "JST / UTC",
    timeModelLabel: "時刻モデル",
    bodyweight:     "体重",
    changeWeight:   "体重変更",
    fileLabel:      "GPSファイルを選択 (*.gpx)",
    fileBtn:        "ファイル選択",
    noFile:         "(No file)",
    process:        "計算実行",
    saveData:       "データ保存",
    showGraph:      "グラフ表示",
    resultTitle:    "解析結果",
    activityLevel:  "身体活動水準",
    activityStats:  "活動統計",
    hour:           "時",
    totalKcal:      "総 kcal",
    avgKcalmin:     "平均 kcal/min",
    totalTime:      "総時間",
    totalDist:      "総距離",
    ascent:         "上り",
    descent:        "下り",
    graphTitle:     "METs / 高度 グラフ",
    saveGraph:      "グラフ保存",
    cancel:         "キャンセル",
    ok:             "OK",
    wmTitle:        "体重入力",
    wmMsg:          "体重を入力してください (kg)",
    selectFile:     "GPXファイルを選択してください",
    noData:         "データがありません。先に計算を実行してください",
    unknownFormat:  "対応していないファイル形式です（.gpx のみ対応）",
    metsAvgLabel:   "（平均）",
  },
  en: {
    subtitle:       "Terrain-Adaptive GPS Physical Activity Assessment Tool",
    reload:         "Reset",
    tzLabel:        "JST / UTC",
    timeModelLabel: "Time model",
    bodyweight:     "Body weight",
    changeWeight:   "Change BW",
    fileLabel:      "Select a GPS file (*.gpx)",
    fileBtn:        "Select File",
    noFile:         "(No file)",
    process:        "Run Calculation",
    saveData:       "Save Data",
    showGraph:      "Show Graph",
    resultTitle:    "Analysis Results",
    activityLevel:  "Activity Level",
    activityStats:  "Activity Stats",
    hour:           "h",
    totalKcal:      "Total kcal",
    avgKcalmin:     "Avg kcal/min",
    totalTime:      "Total time",
    totalDist:      "Total dist.",
    ascent:         "Ascent",
    descent:        "Descent",
    graphTitle:     "METs / Altitude Graph",
    saveGraph:      "Save Graph",
    cancel:         "Cancel",
    ok:             "OK",
    wmTitle:        "Enter Body Weight",
    wmMsg:          "Please enter your body weight (kg)",
    selectFile:     "Please select a GPX file",
    noData:         "No data. Please run the calculation first",
    unknownFormat:  "Unsupported file format (only .gpx is supported)",
    metsAvgLabel:   "(Avg)",
  }
};

let lang = localStorage.getItem("geomets_lang") || "ja";
function t(k) { return T[lang][k] || k; }

function applyLang() {
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const k = el.getAttribute("data-i18n");
    if (T[lang][k] !== undefined) el.textContent = T[lang][k];
  });
  document.getElementById("lang-btn").textContent = lang === "ja" ? "EN" : "JA";
}

document.getElementById("lang-btn").addEventListener("click", () => {
  lang = lang === "ja" ? "en" : "ja";
  localStorage.setItem("geomets_lang", lang);
  applyLang();
});

/* ==========================================================
   Body weight (modal)
========================================================== */
let bodymass = parseFloat(localStorage.getItem("geomets_bm") || "0");

function updateWeightDisplay() {
  document.getElementById("weight-val").textContent =
    bodymass > 0 ? bodymass.toFixed(1) : "--";
}

function showWeightModal(cb) {
  const overlay = document.getElementById("modal-overlay");
  document.getElementById("modal-title").textContent = t("wmTitle");
  document.getElementById("modal-msg").textContent = t("wmMsg");
  const inp = document.getElementById("modal-input");
  inp.value = bodymass > 0 ? bodymass : "";
  inp.placeholder = "例: 65";
  overlay.classList.add("visible");
  setTimeout(() => inp.focus(), 80);

  const okBtn     = document.getElementById("modal-ok");
  const cancelBtn = document.getElementById("modal-cancel");

  const done = (saved) => {
    overlay.classList.remove("visible");
    okBtn.removeEventListener("click", onOk);
    cancelBtn.removeEventListener("click", onCancel);
    inp.removeEventListener("keydown", onKey);
    if (cb) cb(saved);
  };
  const onOk = () => {
    const v = parseFloat(inp.value);
    if (!isNaN(v) && v >= 20 && v <= 300) {
      bodymass = v;
      localStorage.setItem("geomets_bm", v);
      updateWeightDisplay();
      done(true);
    } else {
      inp.style.borderColor = "red";
      setTimeout(() => { inp.style.borderColor = ""; }, 800);
    }
  };
  const onCancel = () => done(false);
  const onKey    = (e) => { if (e.key === "Enter") onOk(); if (e.key === "Escape") onCancel(); };

  okBtn.addEventListener("click", onOk);
  cancelBtn.addEventListener("click", onCancel);
  inp.addEventListener("keydown", onKey);
}

document.getElementById("change-weight-btn").addEventListener("click", () => {
  showWeightModal(() => {});
});

/* ==========================================================
   TZ
========================================================== */
let currentTZ = localStorage.getItem("geomets_tz") || "JST";
document.getElementById("tz-select").value = currentTZ;
document.getElementById("tz-select").addEventListener("change", (e) => {
  currentTZ = e.target.value;
  localStorage.setItem("geomets_tz", currentTZ);
});

/* ==========================================================
   Helpers
========================================================== */
function toRad(d) { return d * Math.PI / 180; }

function dist2D(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2
          + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function Cw(i) { return 280.5*i**5 - 58.7*i**4 - 76.8*i**3 + 51.9*i**2 + 19.6*i + 2.5; }
function Cr(i) { return 155.4*i**5 - 30.4*i**4 - 43.3*i**3 + 46.3*i**2 + 19.5*i + 3.6; }

function getNowForFilename() {
  const now = new Date();
  let t2 = currentTZ === "JST" ? new Date(now.getTime() + 9*3600000) : now;
  const yyyy = t2.getUTCFullYear();
  const mm   = String(t2.getUTCMonth()+1).padStart(2,"0");
  const dd   = String(t2.getUTCDate()).padStart(2,"0");
  const hh   = String(t2.getUTCHours()).padStart(2,"0");
  const mi   = String(t2.getUTCMinutes()).padStart(2,"0");
  return `${yyyy}${mm}${dd}-${hh}${mi}`;
}

function fmtHMS(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  return (h > 0 ? `${h}h` : "") + `${m}m${s}s`;
}

function formatClock(date) {
  if (!date) return "";
  const d = currentTZ === "JST" ? new Date(date.getTime() + 9*3600000) : date;
  const hh = String(d.getUTCHours()).padStart(2,"0");
  const mm = String(d.getUTCMinutes()).padStart(2,"0");
  return `${hh}:${mm}`;
}

function metsColor(m) {
  if (m >= 6.0) return "var(--mets-high)";
  if (m >= 3.0) return "var(--mets-mid)";
  return "var(--mets-low)";
}

/* ==========================================================
   GPX parser
========================================================== */
function parseGPX(text) {
  const parser = new DOMParser();
  const xml    = parser.parseFromString(text, "application/xml");
  let pts = [...xml.getElementsByTagName("trkpt")];
  if (pts.length === 0) pts = [...xml.getElementsByTagName("rtept")];

  return pts.map(pt => {
    const lat = parseFloat(pt.getAttribute("lat"));
    const lon = parseFloat(pt.getAttribute("lon"));
    const eleNode  = pt.getElementsByTagNameNS("*", "ele")[0];
    const ele      = eleNode ? parseFloat(eleNode.textContent) : 0;
    const timeNode = pt.getElementsByTagName("time")[0];
    let time = null;
    if (timeNode) {
      const txt = timeNode.textContent.trim();
      if (txt.length > 0) time = new Date(txt);
    }
    return { lat, lon, alt: ele, time };
  });
}

/* ==========================================================
   Tobler time generation
========================================================== */
function generateTimesTobler(points, startTime) {
  const result = [];
  let t2 = new Date(startTime);

  for (let i = 0; i < points.length; i++) {
    const p = points[i];
    if (p.alt == null || isNaN(p.alt)) p.alt = i === 0 ? 0 : points[i-1].alt;

    if (i === 0) { result.push({ ...p, time: new Date(t2) }); continue; }

    const p1 = result[i-1];
    const p2 = points[i];
    let d2d  = dist2D(p1.lat, p1.lon, p2.lat, p2.lon);
    let dh   = p2.alt - p1.alt;
    let d    = Math.sqrt(d2d*d2d + dh*dh);
    if (d < 1) d = 1;

    const s   = dh / d;
    const v   = 6 * Math.exp(-3.5 * Math.abs(s + 0.05));
    let dt    = d / (v * 1000 / 3600);
    if (dt < 1) dt = 1;
    if (dt > 10) dt = 10;

    t2 = new Date(t2.getTime() + dt * 1000);
    result.push({ ...p2, time: new Date(t2) });
  }
  return result;
}

/* ==========================================================
   20-second segment slicing
========================================================== */
function nearest(points, target) {
  let best = null, diff = Infinity;
  for (const p of points) {
    const d = Math.abs(p.time - target);
    if (d < diff) { diff = d; best = p; }
  }
  return best;
}

function slice20(points) {
  const segs = [];
  if (points.length < 2) return segs;

  let t2  = new Date(points[0].time);
  const end = points[points.length-1].time;
  let isFirst = true;

  while (t2 < end) {
    const t3 = new Date(t2.getTime() + 30000);

    if (isFirst) {
      segs.push({ start: { ...points[0], time: new Date(t2) }, end: { ...points[0], time: new Date(t3) } });
      isFirst = false;
      t2 = t3;
      continue;
    }

    let p1 = nearest(points, t2);
    let p2 = nearest(points, t3);

    if (p1 === p2) {
      const idx = points.indexOf(p1);
      if (idx+1 < points.length) p2 = points[idx+1]; else break;
    }
    if (p2.time <= p1.time) {
      const idx = points.indexOf(p1);
      if (idx+1 < points.length) p2 = points[idx+1]; else break;
    }

    segs.push({ start: { ...p1, time: new Date(t2) }, end: { ...p2, time: new Date(t3) } });
    t2 = t3;
  }
  return segs;
}

/* ==========================================================
   METs computation
========================================================== */
function processSegments(segs, bm) {
  let exCum = 0, kcalCum = 0;
  const results = [];

  for (const s of segs) {
    const d2d = dist2D(s.start.lat, s.start.lon, s.end.lat, s.end.lon);
    const dh  = s.end.alt - s.start.alt;
    const d   = Math.sqrt(d2d*d2d + dh*dh);

    if (d < 5)         continue;
    if (Math.abs(dh) > 5) continue;

    const dt      = 30;
    const v_mps   = d / dt;
    const running = v_mps >= 1.11;
    const i       = Math.max(-0.5, Math.min(0.5, dh / d));
    const Ci      = running ? Cr(i) : Cw(i);
    const Ec      = Ci * d;

    const Ek_net_per_kg = Ec * 0.000239 * (60 / dt);
    const Ek_net        = Ek_net_per_kg * bm;
    const Ek_rest       = 0.0175 * bm;
    const Ek_total      = Ek_net + Ek_rest;

    let METs = Ek_total / (0.0175 * bm);
    if (METs < 1) METs = 1;
    METs = Math.min(METs, 18);

    const exDelta   = METs * (dt / 3600);
    const kcalDelta = Ek_total * (dt / 60);

    exCum   += exDelta;
    kcalCum += kcalDelta;

    results.push({
      start: s.start.time,
      end:   s.end.time,
      alt:   s.start.alt,
      d, dh, i,
      speed: v_mps * 3.6,
      running,
      METs, Ek: Ek_total,
      exCum, kcalCum
    });
  }
  return results;
}

function addCumulativeDistance(res) {
  let cum = 0;
  for (const r of res) { cum += r.d; r.cumDist = cum; }
}

/* ==========================================================
   2-minute METs smoothing
========================================================== */
function twoMinuteMets(arr) {
  return arr.map((_, i) =>
    i < 3 ? arr[i] : (arr[i] + arr[i-1] + arr[i-2] + arr[i-3]) / 4
  );
}

/* ==========================================================
   State
========================================================== */
let lastResult = null;
let chartInstance = null;

function resetUI() {
  lastResult = null;
  document.getElementById("result-card").classList.remove("visible");
  document.getElementById("graph-card").classList.remove("visible");
  document.getElementById("action-row").style.display = "none";
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
}

/* ==========================================================
   File selection
========================================================== */
document.getElementById("file-select-btn").addEventListener("click", () => {
  document.getElementById("file-input").click();
});

document.getElementById("file-input").addEventListener("change", (e) => {
  resetUI();
  document.getElementById("time-model-select").value = "none";
  const f = e.target.files[0];
  const nameEl = document.getElementById("file-name");
  if (f) {
    nameEl.textContent = f.name;
    nameEl.classList.add("loaded");
  } else {
    nameEl.textContent = t("noFile");
    nameEl.classList.remove("loaded");
  }
});

/* ==========================================================
   Process button
========================================================== */
document.getElementById("process-btn").addEventListener("click", () => {
  const file = document.getElementById("file-input").files[0];
  if (!file) { alert(t("selectFile")); return; }

  const ensureWeight = (cb) => {
    if (bodymass > 0) { cb(); return; }
    showWeightModal((ok) => { if (ok) cb(); });
  };

  ensureWeight(() => {
    const reader = new FileReader();
    reader.onload = () => {
      const text = reader.result;
      if (!text.includes("<gpx")) { alert(t("unknownFormat")); return; }

      let points = parseGPX(text);
      const hasAllTime = points.every(p => p.time !== null);
      const userModel  = document.getElementById("time-model-select").value;

      let internalModel;
      if (userModel === "tobler")  internalModel = "tobler";
      else internalModel = hasAllTime ? "none" : "tobler";

      document.getElementById("time-model-select").value = internalModel;

      const pointsWithTime = internalModel === "none"
        ? points
        : generateTimesTobler(points, new Date());

      const segs = slice20(pointsWithTime);
      const res  = processSegments(segs, bodymass);

      if (res.length === 0) { alert(t("noData")); return; }

      addCumulativeDistance(res);
      lastResult = res;

      showResult(res, segs);

      document.getElementById("action-row").style.display = "flex";
    };
    reader.readAsText(file);
  });
});

/* ==========================================================
   Show result
========================================================== */
function showResult(res, segs) {
  const last = res[res.length - 1];
  const dtHour = 20 / 3600;

  const avgMETs  = res.reduce((s, r) => s + r.METs, 0) / res.length;
  const maxMETs  = res.reduce((m, r) => r.METs > m ? r.METs : m, 0);
  const totalEx  = res.reduce((s, r) => s + r.METs * dtHour, 0);
  const totalKcal = last.kcalCum;

  let totalDist = 0, totalUp = 0, totalDown = 0;
  for (const r of res) {
    totalDist += r.d;
    if (r.dh > 0) totalUp += r.dh;
    else totalDown += Math.abs(r.dh);
  }

  const totalTimeSec = segs.length * 30;
  const avgKcalMin   = totalKcal / (totalTimeSec / 60);

  // Time range
  let timeRangeText = "";
  if (res[0].start && res[res.length-1].end) {
    const s = formatClock(res[0].start);
    const e = formatClock(res[res.length-1].end);
    timeRangeText = `${s} – ${e} ${currentTZ}`;
  }

  // Populate
  const metsEl = document.getElementById("mets-big-value");
  metsEl.textContent = avgMETs.toFixed(1);
  metsEl.style.color = metsColor(avgMETs);

  document.getElementById("mets-max-val").textContent = maxMETs.toFixed(1);
  document.getElementById("sum-ex").textContent      = totalEx.toFixed(2);
  document.getElementById("sum-kcal").textContent    = Math.round(totalKcal);
  document.getElementById("sum-kcalmin").textContent = `${avgKcalMin.toFixed(2)} kcal/min`;

  const timeEl = document.getElementById("sum-time");
  timeEl.innerHTML = fmtHMS(totalTimeSec)
    + (timeRangeText ? `<span id="time-range-badge">${timeRangeText}</span>` : "");

  document.getElementById("sum-dist").textContent = `${(totalDist/1000).toFixed(3)} km`;
  document.getElementById("sum-up").textContent   = `${Math.round(totalUp)} m`;
  document.getElementById("sum-down").textContent = `${Math.round(totalDown)} m`;

  document.getElementById("result-card").classList.add("visible");
}

/* ==========================================================
   Share / download helper (Web Share API → fallback)
========================================================== */
async function shareOrDownload(blob, filename) {
  const file = new File([blob], filename, { type: blob.type });
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file] });
      return;
    } catch (e) {
      if (e.name === "AbortError") return;
    }
  }
  const url = URL.createObjectURL(blob);
  const a   = document.createElement("a");
  a.href     = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

/* ==========================================================
   Save Excel
========================================================== */
document.getElementById("save-btn").addEventListener("click", () => {
  if (!lastResult) { alert(t("noData")); return; }

  const res = lastResult;

  // Summary stats
  const avgMETs      = res.reduce((s, r) => s + r.METs, 0) / res.length;
  const maxMETs      = res.reduce((m, r) => r.METs > m ? r.METs : m, 0);
  const last         = res[res.length - 1];
  const totalTimeSec = res.length * 30;
  let totalDist = 0, totalUp = 0, totalDown = 0;
  for (const r of res) {
    totalDist += r.d;
    if (r.dh > 0) totalUp += r.dh; else totalDown += Math.abs(r.dh);
  }

  // Sheet 1: 20-second interval data
  const dataRows = [[
    "Index","Time","Altitude(m)","Distance(m)","Alt.Delta(m)","Speed(km/h)",
    "METs","kcal/min","Cumul.Dist(m)","Cumul.Ex(METs·h)","Cumul.kcal"
  ]];
  res.forEach((r, i) => {
    dataRows.push([
      i+1,
      r.start.toISOString(),
      parseFloat(r.alt.toFixed(2)),
      parseFloat(r.d.toFixed(2)),
      parseFloat(r.dh.toFixed(2)),
      parseFloat(r.speed.toFixed(2)),
      parseFloat(r.METs.toFixed(2)),
      parseFloat(r.Ek.toFixed(2)),
      parseFloat(r.cumDist.toFixed(2)),
      parseFloat(r.exCum.toFixed(4)),
      parseFloat(r.kcalCum.toFixed(2))
    ]);
  });

  // Sheet 2: Summary
  const sumRows = [
    ["--- Summary ---"],
    ["Avg METs",        parseFloat(avgMETs.toFixed(2))],
    ["Max METs",        parseFloat(maxMETs.toFixed(2))],
    ["Ex (METs·h)",     parseFloat(last.exCum.toFixed(4))],
    ["Total kcal",      Math.round(last.kcalCum)],
    ["Avg kcal/min",    parseFloat((last.kcalCum / (totalTimeSec / 60)).toFixed(3))],
    ["Total time (s)",  totalTimeSec],
    ["Total dist (m)",  parseFloat(totalDist.toFixed(2))],
    ["Ascent (m)",      Math.round(totalUp)],
    ["Descent (m)",     Math.round(totalDown)],
  ];

  const wsData = XLSX.utils.aoa_to_sheet(dataRows);
  const wsSum  = XLSX.utils.aoa_to_sheet(sumRows);
  const wb     = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, wsSum,  "Summary");
  XLSX.utils.book_append_sheet(wb, wsData, "30sec Data");

  const wbout   = XLSX.write(wb, { bookType: "xlsx", type: "array" });
  const blob    = new Blob([wbout], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
  const filename = `GeoMETs_${getNowForFilename()}.xlsx`;
  shareOrDownload(blob, filename);
});

/* ==========================================================
   Show / update graph
========================================================== */
document.getElementById("graph-btn").addEventListener("click", () => {
  if (!lastResult) { alert(t("noData")); return; }
  renderGraph(lastResult);
  document.getElementById("graph-card").classList.add("visible");
  document.getElementById("graph-card").scrollIntoView({ behavior: "smooth", block: "nearest" });
});

function renderGraph(res) {
  const timeMin  = res.map((r, i) => (i * 30) / 60);
  const totalMin = timeMin[timeMin.length-1];

  let lineWidth = 2;
  if (totalMin > 60)       lineWidth = 1;
  else if (totalMin > 30)  lineWidth = 1.5;

  const metsRaw  = res.map((r, i) => ({ x: timeMin[i], y: r.METs }));
  const altsData = res.map((r, i) => ({ x: timeMin[i], y: r.alt }));
  const rawArr   = res.map(r => r.METs);

  const datasets = [{
    label: "METs (Raw)",
    data: metsRaw,
    borderColor: "rgba(26,111,181,0.25)",
    borderWidth: lineWidth,
    pointRadius: 0,
    yAxisID: "y1"
  }];

  if (totalMin >= 30) {
    const smooth = twoMinuteMets(rawArr);
    datasets.push({
      label: "METs (2 min avg)",
      data: smooth.map((v, i) => ({ x: timeMin[i], y: v })),
      borderColor: "rgba(26,111,181,1)",
      borderWidth: lineWidth + 1,
      pointRadius: 0,
      yAxisID: "y1"
    });
  }

  datasets.push({
    label: "Altitude (m)",
    data: altsData,
    borderColor: "var(--mets-mid)",
    borderWidth: lineWidth,
    pointRadius: 0,
    yAxisID: "y2"
  });

  const maxMets = Math.max(...rawArr);
  const maxAlt  = Math.max(...res.map(r => r.alt));

  if (chartInstance) chartInstance.destroy();

  const ctx = document.getElementById("graph-canvas").getContext("2d");
  chartInstance = new Chart(ctx, {
    type: "line",
    data: { datasets },
    options: {
      responsive: true,
      parsing: false,
      scales: {
        x: {
          type: "linear",
          title: { display: true, text: "Time (min)", color: "#000" },
          grid:  { display: false },
          ticks: { stepSize: 10, maxRotation: 0, color: "#000" },
          border: { width: 1.3, color: "#000" }
        },
        y1: {
          position: "left",
          title: { display: true, text: "METs", color: "#000" },
          grid:  { display: false },
          ticks: { color: "#000" },
          border: { width: 1.3, color: "#000" },
          suggestedMax: maxMets * 1.1
        },
        y2: {
          position: "right",
          title: { display: true, text: "Altitude (m)", color: "#000" },
          grid:  { display: false },
          ticks: { color: "#000" },
          border: { width: 1.3, color: "#000" },
          suggestedMax: maxAlt * 1.1
        }
      },
      plugins: {
        legend: {
          labels: {
            usePointStyle:    true,
            pointStyle:       "line",
            pointStyleWidth:  30,
            boxHeight:        2
          }
        }
      }
    },
    plugins: [{
      afterDraw(chart) {
        const { ctx, chartArea } = chart;
        ctx.save();
        ctx.strokeStyle = "#000";
        ctx.lineWidth   = 1.3;
        ctx.beginPath();
        ctx.moveTo(chartArea.left,  chartArea.top);
        ctx.lineTo(chartArea.right, chartArea.top);
        ctx.stroke();
        ctx.restore();
      }
    }]
  });
}
