<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoMETs+ Final</title>

<style>
body {
  font-family: system-ui, sans-serif;
  max-width: 420px;
  margin: 0 auto;
  padding: 12px;
  box-sizing: border-box;
}

/* タイトル */
#title-row {
  display: flex;
  align-items: baseline;
  gap: 6px;
}
#appTitle { font-size: 1.8em; font-weight: bold; }
#appVersion { font-size: 0.8em; color: #666; }

/* 設定 */
.settings-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
  margin-top: 10px;
  font-size: 0.9em;
}
.settings-grid select {
  width: 100%;
  padding: 4px;
  font-size: 1em;
  box-sizing: border-box;
}

/* カード */
.card-big, .card-small {
  background: #f5f5f5;
  border-radius: 10px;
  padding: 10px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.card-big { aspect-ratio: 1 / 1; }
.card-small { aspect-ratio: 1 / 1; }

/* ラベル */
.card-label {
  font-size: 0.95em;
  color: #666;
  text-align: center;
}

/* 主役：平均METs */
.card-big .card-value {
  font-size: 6.0em;
  font-weight: 900;
  text-align: center;
  line-height: 1.0;
}
.card-big .card-unit {
  font-size: 1.2em;
  text-align: center;
  margin-top: 4px;
}

/* 他の数字 */
.card-small .card-value {
  font-weight: 800;
  text-align: center;
  line-height: 1.0;
}
#avgSpeedValue { font-size: 2.2em; }
#cumKmValueKm { font-size: 2.1em; display:block; }
#cumKmValueM  { font-size: 2.1em; display:block; }
#cumExValue   { font-size: 2.2em; }
#cumKcalValue { font-size: 2.2em; }

/* 上り/下りと高度変化は縮小しない */
#cumUpDownValue { font-size: 2.4em; }
#altChangeValue { font-size: 2.4em; }

.card-small .card-unit {
  font-size: 1.0em;
  text-align: center;
  margin-top: 3px;
}

/* グリッドレイアウト */
.top-row {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 10px;
  margin-top: 16px;
}
.top-right-col {
  display: grid;
  grid-template-rows: 1fr 1fr;
  gap: 10px;
}

.mid-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-top: 16px;
}

.bottom-row {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 10px;
  margin-top: 16px;
}

/* ボタン */
.button-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 8px;
}
.button-grid button {
  width: 100%;
  padding: 8px 4px;
  font-size: 1.1em;
  line-height: 1.4em;
  box-sizing: border-box;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* GPS */
#gpsStatus {
  font-weight: bold;
  text-align: center;
  color: red;
}

/* ステータス */
.small-text {
  font-size: 0.8em;
  color: #666;
  margin-top: 4px;
  text-align: right;
}
</style>
</head>

<body>

<!-- タイトル -->
<div id="title-row">
  <div id="appTitle">GeoMETs+</div>
  <div id="appVersion">Final</div>
</div>

<!-- 設定 -->
<div class="settings-grid">
  <div id="labelLanguage">言語</div>
  <div>JST / UTC</div>
  <div id="labelGpsState">衛星捕捉状態</div>

  <div>
    <select id="langSelect">
      <option value="ja">日本語</option>
      <option value="en">English</option>
    </select>
  </div>
  <div>
    <select id="tzSelect">
      <option value="JST">JST</option>
      <option value="UTC">UTC</option>
    </select>
  </div>
  <div id="gpsStatus">GPS未捕捉</div>
</div>

<!-- 上段 -->
<div class="top-row">

  <div class="card-big">
    <div class="card-label" id="labelAvgMets">累積</div>
    <div class="card-value" id="avgMetsValue">0.0</div>
    <div class="card-unit" id="unitMets">METs</div>
  </div>

  <div class="top-right-col">
    <div class="card-small">
      <div class="card-label" id="labelAvgSpeed">累積</div>
      <div class="card-value" id="avgSpeedValue">0.0</div>
      <div class="card-unit" id="unitSpeed">km/h</div>
    </div>

    <div class="card-small">
      <div class="card-label" id="labelAltChange">高度変化</div>
      <div class="card-value" id="altChangeValue">0.0</div>
      <div class="card-unit" id="unitAlt">m/30s</div>
    </div>
  </div>

</div>

<!-- 中段 -->
<div class="mid-row">

  <div class="card-small">
    <div class="card-label">累積</div>
    <div class="card-value" id="cumExValue">0.00</div>
    <div class="card-unit">Ex</div>
  </div>

  <div class="card-small">
    <div class="card-label">累積</div>
    <div class="card-value" id="cumKmValue">
      <span id="cumKmValueKm">0 km</span>
      <span id="cumKmValueM">0 m</span>
    </div>
    <div class="card-unit">km / m</div>
  </div>

  <div class="card-small">
    <div class="card-label">累積<br>(上り/下り)</div>
    <div class="card-value" id="cumUpDownValue">
      <span id="cumUpValue">0</span>/<span id="cumDownValue">0</span>
    </div>
    <div class="card-unit">m</div>
  </div>

</div>

<!-- 下段 -->
<div class="bottom-row">

  <div class="card-small">
    <div class="card-label">累積</div>
    <div class="card-value" id="cumKcalValue">0</div>
    <div class="card-unit">kcal</div>
  </div>

  <div class="button-grid">
    <button id="startBtn">開始</button>
    <button id="resetBtn">リセット</button>
    <button id="weightBtn">体重変更</button>
    <button id="saveBtn">保存</button>
  </div>

</div>

<div class="small-text" id="statusText"></div>

<script>
/* ===== 状態 ===== */
let running = false;

/* GPS値 */
let currentSpeed = 0;
let currentAltDiff = 0;
let currentMets = 0;

let lastAltitude = null;

/* 30秒バッファ */
let bufferTime = 0;
let bufferSpeed = [];
let bufferMets = [];
let blockAltChange = 0; // この30秒ブロックでの高度変化合計（m）

/* 累積 */
let weight = Number(localStorage.getItem("geomets_weight") || "60");
let cumEx = 0, cumKm = 0, cumUp = 0, cumDown = 0, cumKcal = 0;

/* 平均表示 */
let avgMets = 0, avgSpeed = 0, avgAltChange = 0;

/* GPS開始（アプリ起動直後） */
navigator.geolocation.watchPosition(
  pos => {
    gpsStatus.textContent = "GPS捕捉中";
    gpsStatus.style.color = "green";

    const alt = pos.coords.altitude;

    if (lastAltitude !== null && alt !== null) {
      let diff = alt - lastAltitude;   // 高度差（m）
      if (Math.abs(diff) < 0.5) diff = 0; // ノイズ除去
      currentAltDiff = diff;
    } else {
      currentAltDiff = 0;
    }

    lastAltitude = alt;

    /* speed は m/s → km/h に変換 */
    currentSpeed = (pos.coords.speed ?? 0) * 3.6;

    currentMets = Math.max(1, 1 + (currentSpeed - 1) * 0.2);
  },
  err => {
    gpsStatus.textContent = "GPS未捕捉";
    gpsStatus.style.color = "red";
  },
  { enableHighAccuracy: true }
);

/* 平均 */
function avg(arr) {
  if (arr.length === 0) return 0;
  return arr.reduce((a,b)=>a+b,0) / arr.length;
}

/* 表示更新 */
function updateDisplay() {
  avgMetsValue.textContent = avgMets.toFixed(1);
  avgSpeedValue.textContent = avgSpeed.toFixed(1);
  altChangeValue.textContent = avgAltChange.toFixed(1);

  cumExValue.textContent = cumEx.toFixed(2);

  // 累積 km → km と m に分解
  const kmInt = Math.floor(cumKm);
  const mInt  = Math.round((cumKm - kmInt) * 1000);
  cumKmValueKm.textContent = kmInt + " km";
  cumKmValueM.textContent  = mInt  + " m";

  cumUpValue.textContent = Math.round(cumUp);
  cumDownValue.textContent = Math.round(cumDown);
  cumKcalValue.textContent = Math.round(cumKcal);

  statusText.textContent = `BW: ${weight.toFixed(1)} kg`;
}

/* 毎秒処理（30秒平均＋累積） */
setInterval(() => {
  if (!running) return;

  /* バッファ追加 */
  bufferSpeed.push(currentSpeed);
  bufferMets.push(currentMets);
  bufferTime += 1;

  /* 高度変化はこの30秒ブロックの合計として積算 */
  blockAltChange += currentAltDiff;

  /* 毎秒の累積km・kcal */
  cumKm += currentSpeed / 3600;
  cumKcal += currentMets * weight / 3600;

  /* 30秒経過したら平均を更新 */
  if (bufferTime >= 30) {
    avgSpeed = avg(bufferSpeed);
    avgMets = avg(bufferMets);
    avgAltChange = blockAltChange; // この30秒での高度変化合計（m）

    /* 累積Ex */
    cumEx += avgMets * (30 / 3600);

    /* 累積Up/Down */
    if (blockAltChange > 0) cumUp += blockAltChange;
    else if (blockAltChange < 0) cumDown += -blockAltChange;

    /* バッファリセット */
    bufferSpeed = [];
    bufferMets = [];
    bufferTime = 0;
    blockAltChange = 0;
  }

  updateDisplay();
}, 1000);

/* Start ↔ End */
startBtn.addEventListener("click", () => {
  running = !running;
  startBtn.textContent = running ? "終了" : "開始";
});

/* Reset */
resetBtn.addEventListener("click", () => {
  running = false;
  startBtn.textContent = "開始";

  avgMets = avgSpeed = avgAltChange = 0;
  cumEx = cumKm = cumUp = cumDown = cumKcal = 0;

  bufferTime = 0;
  bufferSpeed = [];
  bufferMets = [];
  blockAltChange = 0;

  updateDisplay();
});

/* Change BW */
weightBtn.addEventListener("click", () => {
  const v = prompt("体重を入力してください (kg)", weight.toFixed(1));
  if (v == null) return;
  const w = Number(v);
  if (!isNaN(w) && w > 0 && w < 300) {
    weight = w;
    localStorage.setItem("geomets_weight", String(weight));
    updateDisplay();
  } else {
    alert("体重の値が不正です。");
  }
});

/* 保存（スマホ対応） */
saveBtn.addEventListener("click", () => {
  const rows = [
    ["Average METs", avgMets.toFixed(1)],
    ["Average Speed", avgSpeed.toFixed(1)],
    ["Altitude Change (30s)", avgAltChange.toFixed(1)],
    ["Cumulative Ex", cumEx.toFixed(2)],
    ["Cumulative Distance (km)", cumKm.toFixed(3)],
    ["Cumulative Up", Math.round(cumUp)],
    ["Cumulative Down", Math.round(cumDown)],
    ["Cumulative kcal", Math.round(cumKcal)],
    ["Body Weight", weight.toFixed(1)]
  ];
  const csv = rows.map(r => r.join(",")).join("\n");
  const blob = new Blob([csv], {type: "text/csv"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "geomets_session.csv";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  URL.revokeObjectURL(url);
});

updateDisplay();
</script>

</body>
</html>
