<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoMETs+ Final</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body {
  font-family: system-ui, sans-serif;
  max-width: 420px;
  margin: 0 auto;
  padding: 12px;
  box-sizing: border-box;
}

/* タイトル */
#title-row {
  display: flex;
  align-items: baseline;
  gap: 6px;
}
#appTitle { font-size: 1.8em; font-weight: bold; }
#appVersion { font-size: 0.8em; color: #666; }

/* 設定 */
.settings-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
  margin-top: 10px;
  font-size: 0.9em;
}
.settings-grid select {
  width: 100%;
  padding: 4px;
  font-size: 1em;
  box-sizing: border-box;
}

/* カード背景 */
.card-big,
.card-small {
  background: #f5f5f5;
  border-radius: 10px;
  padding: 12px;
  box-sizing: border-box;
}

/* 平均METsカード */
.card-big {
  height: 228px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* 小カード */
.card-small {
  height: 110px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* ラベル */
.card-label {
  font-size: 0.95em;
  color: #666;
  text-align: center;
}

/* 主役：平均METs */
.card-big .card-value {
  font-size: 6.0em;
  font-weight: 900;
  text-align: center;
  line-height: 1.0;
}
.card-big .card-unit {
  font-size: 1.2em;
  text-align: center;
  margin-top: 4px;
}

/* 数字（等幅フォントで揺れ防止） */
.card-value {
  font-family: "Roboto Mono", "Menlo", "Courier New", monospace;
  letter-spacing: -1px;
}

#avgSpeedValue { font-size: 2.2em; }
#cumExValue   { font-size: 2.0em; }
#cumUpDownValue { font-size: 2.0em; }
#cumKcalValue { font-size: 2.0em; }

/* km と m の単位を小さく（C案） */
#cumKmValueKm,
#cumKmValueM {
  font-size: 1.6em;
  line-height: 1.0;
  display: block;
}

#cumKmValueKm::after {
  content: " km";
  font-size: 0.6em;
}
#cumKmValueM::after {
  content: " m";
  font-size: 0.6em;
}

/* Ex の単位を小さく */
#cumExUnit {
  font-size: 0.6em;
  text-align: center;
  margin-top: 2px;
}

/* 高度変化は縮小しない */
#altChangeValue { font-size: 2.4em; }

/* 単位を小さく */
.card-unit {
  font-size: 0.75em;
  text-align: center;
  margin-top: 3px;
}

/* 上段レイアウト */
.top-row {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 10px;
  margin-top: 16px;
}

.top-right-col {
  display: grid;
  grid-template-rows: 1fr 1fr;
  gap: 10px;
}

/* 中段（累積Ex と kcal の幅を揃える） */
.mid-row {
  display: grid;
  grid-template-columns: 0.9fr 1fr 0.9fr;
  gap: 10px;
  margin-top: 16px;
}

/* 下段（ボタンを左右いっぱいに） */
.bottom-row {
  display: grid;
  grid-template-columns: 0.9fr 1.1fr;
  gap: 10px;
  margin-top: 16px;
}

/* 2×2 ボタン配置 */
.button-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.button-col {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.button-col button {
  width: 100%;
  height: 60px;
  font-size: 1.3em;
  padding: 6px 4px;
}

/* GPS */
#gpsStatus {
  font-weight: bold;
  text-align: center;
  color: red;
}

/* ステータス */
.small-text {
  font-size: 0.8em;
  color: #666;
  margin-top: 4px;
  text-align: right;
}
</style>
</head>

<body>

<div id="title-row">
  <div id="appTitle">GeoMETs+</div>
  <div id="appVersion">Final</div>
</div>

<div class="settings-grid">
  <div id="labelLanguage">言語</div>
  <div>JST / UTC</div>
  <div id="labelGpsState">衛星捕捉状態</div>

  <div>
    <select id="langSelect">
      <option value="ja">日本語</option>
      <option value="en">English</option>
    </select>
  </div>
  <div>
    <select id="tzSelect">
      <option value="JST">JST</option>
      <option value="UTC">UTC</option>
    </select>
  </div>
  <div id="gpsStatus">GPS未捕捉</div>
</div>

<!-- 上段 -->
<div class="top-row">

  <div class="card-big">
    <div class="card-label" id="labelAvgMets">平均 (30秒)</div>
    <div class="card-value" id="avgMetsValue">0.0</div>
    <div class="card-unit" id="unitMets">METs</div>
  </div>

  <div class="top-right-col">
    <div class="card-small">
      <div class="card-label" id="labelAvgSpeed">平均 (30秒)</div>
      <div class="card-value" id="avgSpeedValue">0.0</div>
      <div class="card-unit" id="unitSpeed">km/h</div>
    </div>

    <div class="card-small">
      <div class="card-label" id="labelAltChange">高度変化</div>
      <div class="card-value" id="altChangeValue">0.0</div>
      <div class="card-unit" id="unitAlt">m/30s</div>
    </div>
  </div>

</div>

<!-- 中段 -->
<div class="mid-row">

  <div class="card-small">
    <div class="card-label" id="labelCumEx">累積</div>
    <div class="card-value" id="cumExValue">0.00</div>
    <div id="cumExUnit">Ex</div>
  </div>

  <div class="card-small">
    <div class="card-label" id="labelCumKm">累積</div>
    <div class="card-value" id="cumKmValue">
      <span id="cumKmValueKm">0</span>
      <span id="cumKmValueM">0</span>
    </div>
  </div>

  <div class="card-small">
    <div class="card-label" id="labelUpDown">累積<br>(上り/下り)</div>
    <div class="card-value" id="cumUpDownValue">
      <span id="cumUpValue">0</span>/<span id="cumDownValue">0</span>
    </div>
    <div class="card-unit">m</div>
  </div>

</div>

<!-- 下段 -->
<div class="bottom-row">

  <div class="card-small">
    <div class="card-label" id="labelCumKcal">累積</div>
    <div class="card-value" id="cumKcalValue">0</div>
    <div class="card-unit">kcal</div>
  </div>

  <div class="button-grid">

    <div class="button-col">
      <button id="startBtn">開始</button>
      <button id="weightBtn">体重変更</button>
    </div>

    <div class="button-col">
      <button id="resetBtn">リセット</button>
      <button id="saveBtn">保存</button>
    </div>

  </div>

</div>

<div class="small-text" id="statusText"></div>

<script>
/* ===== i18n ===== */
const i18n = {
  ja: {
    avgMets: "平均 (30秒)",
    avgSpeed: "平均 (30秒)",
    altChange: "高度変化",
    cumulative: "累積",
    updown: "累積<br>(上り/下り)",
    kcal: "kcal",
    ex: "Ex",
    km_m: "km / m",
    start: "開始",
    stop: "終了",
    reset: "リセット",
    weight: "体重変更",
    save: "保存",
    gpsLost: "GPS未捕捉",
    gpsOK: "GPS捕捉中",
    askGPX: "GPXファイル も保存しますか？"
  },
  en: {
    avgMets: "Average (30s)",
    avgSpeed: "Average (30s)",
    altChange: "Altitude Change",
    cumulative: "Cumulative",
    updown: "Cumulative<br>(Up/Down)",
    kcal: "kcal",
    ex: "Ex",
    km_m: "km / m",
    start: "Start",
    stop: "Stop",
    reset: "Reset",
    weight: "Change Weight",
    save: "Save",
    gpsLost: "GPS Lost",
    gpsOK: "GPS Locked",
    askGPX: "Do you also want to save a GPX file?"
  }
};

/* 言語適用 */
function applyLanguage() {
  const t = i18n[langSelect.value];

  labelAvgMets.innerHTML = t.avgMets;
  labelAvgSpeed.innerHTML = t.avgSpeed;
  labelAltChange.innerHTML = t.altChange;

  labelCumEx.innerHTML = t.cumulative;
  labelCumKm.innerHTML = t.cumulative;
  labelUpDown.innerHTML = t.updown;
  labelCumKcal.innerHTML = t.cumulative;

  startBtn.textContent = running ? t.stop : t.start;
  resetBtn.textContent = t.reset;
  weightBtn.textContent = t.weight;
  saveBtn.textContent = t.save;

  gpsStatus.textContent =
    gpsStatus.style.color === "green" ? t.gpsOK : t.gpsLost;
}

langSelect.addEventListener("change", applyLanguage);

/* ===== 状態 ===== */
let running = false;

/* GPS値 */
let currentSpeed = 0;
let currentAltDiff = 0;
let currentMets = 0;

let lastAltitude = null;

/* 30秒バッファ */
let bufferTime = 0;
let bufferSpeed = [];
let bufferMets = [];
let blockAltChange = 0;

/* 累積 */
let weight = Number(localStorage.getItem("geomets_weight") || "60");
let cumEx = 0, cumKm = 0, cumUp = 0, cumDown = 0, cumKcal = 0;

/* 平均表示 */
let avgMets = 0, avgSpeed = 0, avgAltChange = 0;

/* 時刻管理 */
let startTimeUTC = null;
let blockStartUTC = null;

/* GPSログ（GPX用） */
let gpsLog = [];

/* JST変換 */
function toJST(date) {
  return new Date(date.getTime() + 9 * 3600 * 1000);
}

/* 表示用フォーマット */
function fmt(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const da = String(d.getDate()).padStart(2,"0");
  const h = String(d.getHours()).padStart(2,"0");
  const mi = String(d.getMinutes()).padStart(2,"0");
  const s = String(d.getSeconds()).padStart(2,"0");
  return `${y}-${m}-${da} ${h}:${mi}:${s}`;
}

/* GPS開始 */
navigator.geolocation.watchPosition(
  pos => {
    gpsStatus.style.color = "green";
    gpsStatus.textContent = i18n[langSelect.value].gpsOK;

    const alt = pos.coords.altitude;
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    const nowUTC = new Date();

    gpsLog.push({
      lat, lon, alt,
      timeUTC: nowUTC.toISOString()
    });

    if (lastAltitude !== null && alt !== null) {
      let diff = alt - lastAltitude;
      if (Math.abs(diff) < 0.5) diff = 0;
      currentAltDiff = diff;
    } else {
      currentAltDiff = 0;
    }

    lastAltitude = alt;

    currentSpeed = (pos.coords.speed ?? 0) * 3.6;
    currentMets = Math.max(1, 1 + (currentSpeed - 1) * 0.2);
  },
  err => {
    gpsStatus.style.color = "red";
    gpsStatus.textContent = i18n[langSelect.value].gpsLost;
  },
  { enableHighAccuracy: true }
);

/* 平均 */
function avg(arr) {
  if (arr.length === 0) return 0;
  return arr.reduce((a,b)=>a+b,0) / arr.length;
}

/* 表示更新 */
function updateDisplay() {
  avgMetsValue.textContent = avgMets.toFixed(1);
  avgSpeedValue.textContent = avgSpeed.toFixed(1);
  altChangeValue.textContent = avgAltChange.toFixed(1);

  cumExValue.textContent = cumEx.toFixed(2);

  const kmInt = Math.floor(cumKm);
  const mInt  = Math.round((cumKm - kmInt) * 1000);
  cumKmValueKm.textContent = kmInt;
  cumKmValueM.textContent  = mInt;

  cumUpValue.textContent = Math.round(cumUp);
  cumDownValue.textContent = Math.round(cumDown);
  cumKcalValue.textContent = Math.round(cumKcal);

  statusText.textContent = `BW: ${weight.toFixed(1)} kg`;
}

/* 毎秒処理 */
setInterval(() => {
  if (!running) return;

  bufferSpeed.push(currentSpeed);
  bufferMets.push(currentMets);
  bufferTime += 1;

  blockAltChange += currentAltDiff;

  cumKm += currentSpeed / 3600;
  cumKcal += currentMets * weight / 3600;

  if (bufferTime >= 30) {
    const blockEndUTC = new Date();

    avgSpeed = avg(bufferSpeed);
    avgMets = avg(bufferMets);
    avgAltChange = blockAltChange;

    cumEx += avgMets * (30 / 3600);

    if (blockAltChange > 0) cumUp += blockAltChange;
    else if (blockAltChange < 0) cumDown += -blockAltChange;

    excelBlocks.push({
      startUTC: blockStartUTC,
      endUTC: blockEndUTC,
      avgMets,
      avgSpeed,
      avgAltChange,
      cumEx,
      cumKm,
      cumUp,
      cumDown,
      cumKcal
    });

    bufferSpeed = [];
    bufferMets = [];
    bufferTime = 0;
    blockAltChange = 0;
    blockStartUTC = blockEndUTC;
  }

  updateDisplay();
}, 1000);

/* Excel用ブロック */
let excelBlocks = [];

/* Start */
startBtn.addEventListener("click", () => {
  running = !running;

  if (running) {
    startTimeUTC = new Date();
    blockStartUTC = new Date();
    excelBlocks = [];
    gpsLog = [];
    startBtn.textContent = i18n[langSelect.value].stop;
  } else {
    startBtn.textContent = i18n[langSelect.value].start;
  }
});

/* Reset */
resetBtn.addEventListener("click", () => {
  running = false;
  startBtn.textContent = i18n[langSelect.value].start;

  avgMets = avgSpeed = avgAltChange = 0;
  cumEx = cumKm = cumUp = cumDown = cumKcal = 0;

  bufferTime = 0;
  bufferSpeed = [];
  bufferMets = [];
  blockAltChange = 0;

  excelBlocks = [];
  gpsLog = [];

  updateDisplay();
});

/* Change BW */
weightBtn.addEventListener("click", () => {
  const v = prompt("体重を入力してください (kg)", weight.toFixed(1));
  if (v == null) return;
  const w = Number(v);
  if (!isNaN(w) && w > 0 && w < 300) {
    weight = w;
    localStorage.setItem("geomets_weight", String(weight));
    updateDisplay();
  } else {
    alert("体重の値が不正です。");
  }
});

/* Excel保存（iOS対応版） */
function saveExcel() {
  const wsData = [
    ["Time Start", "Time End", "Avg METs", "Avg Speed", "Alt Change",
     "Cum Ex", "Cum km", "Up", "Down", "kcal"]
  ];

  excelBlocks.forEach(b => {
    const start = (tzSelect.value === "JST") ? fmt(toJST(b.startUTC)) + " JST"
                                            : fmt(b.startUTC) + " UTC";
    const end   = (tzSelect.value === "JST") ? fmt(toJST(b.endUTC)) + " JST"
                                            : fmt(b.endUTC) + " UTC";

    wsData.push([
      start,
      end,
      b.avgMets.toFixed(1),
      b.avgSpeed.toFixed(1),
      b.avgAltChange.toFixed(1),
      b.cumEx.toFixed(2),
      b.cumKm.toFixed(3),
      Math.round(b.cumUp),
      Math.round(b.cumDown),
      Math.round(b.cumKcal)
    ]);
  });

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  XLSX.utils.book_append_sheet(wb, ws, "GeoMETs");

  const wbout = XLSX.write(wb, { bookType: "xlsx", type: "binary" });

  const buf = new ArrayBuffer(wbout.length);
  const view = new Uint8Array(buf);
  for (let i = 0; i < wbout.length; i++) view[i] = wbout.charCodeAt(i) & 0xFF;

  const blob = new Blob([buf], { type: "application/octet-stream" });
  const reader = new FileReader();

  reader.onload = function() {
    const a = document.createElement("a");
    a.href = reader.result;
    a.download = "geomets_session.xlsx";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };

  reader.readAsDataURL(blob);
}

/* GPX保存（iOS対応版） */
function saveGPX() {
  let gpx = `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="GeoMETs+">
<trk><name>GeoMETs+ Track</name><trkseg>
`;

  gpsLog.forEach(p => {
    gpx += `<trkpt lat="${p.lat}" lon="${p.lon}">
<ele>${p.alt}</ele>
<time>${p.timeUTC}</time>
</trkpt>
`;
  });

  gpx += `</trkseg></trk></gpx>`;

  const blob = new Blob([gpx], {type: "application/gpx+xml"});
  const reader = new FileReader();

  reader.onload = function() {
    const a = document.createElement("a");
    a.href = reader.result;
    a.download = "geomets_track.gpx";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };

  reader.readAsDataURL(blob);
}

/* 保存（Excel → ダイアログ → GPX） */
saveBtn.addEventListener("click", () => {

  saveExcel();

  const ask = i18n[langSelect.value].askGPX;

  if (confirm(ask)) {
    saveGPX();
  }
});

applyLanguage();
updateDisplay();
</script>

</body>
</html>
